# Playlist sync status configuration
#
# status values:
#   active   — synced at 2am, tracks included in corpus + classifier training
#   archived — not synced; tracks preserved in DB and corpus but no classifier trained
#   excluded — never synced (default for playlists discovered via Spotify API)
#
# Playlists not listed here default to 'excluded'.
# Names must match Spotify playlist names exactly (case-sensitive).

# ── Acoustic ──────────────────────────────────────────────────────────────────
