name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: ramseywise/ai-project-template/.github/workflows/python-ci.yml@main
    with:
      # Matches Makefile `lint:` (src/ only). The Makefile passes --unsafe-fixes,
      # which is a mutating flag and is deliberately dropped for the CI check.
      lint-paths: "src"
      # `ruff check src/` is clean as of 2026-07-19, so lint gates from day one.
      test-command: "uv run pytest tests/unit -q"
