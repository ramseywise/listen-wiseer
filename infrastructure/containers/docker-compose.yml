networks:
  listen-wiseer-network:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── Postgres (LangGraph checkpointer — always-on) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: listen-wiseer-db
    environment:
      - POSTGRES_DB=listen_wiseer
      - POSTGRES_USER=wiseer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - listen-wiseer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseer -d listen_wiseer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── DB init (one-shot: DuckDB schema + bootstrap from archived CSVs if present) ─
  db-init:
    build:
      context: ../..
      dockerfile: infrastructure/containers/app/Dockerfile
    container_name: listen-wiseer-db-init
    command: python -m etl.bootstrap
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../../data:/app/data
      - ../../infrastructure/db:/app/infrastructure/db
    networks:
      - listen-wiseer-network
    restart: no

  # ── MCP server (Spotify tools for the agent) ─────────────────────────────────
  mcp:
    build:
      context: ../..
      dockerfile: infrastructure/containers/mcp/Dockerfile
    container_name: listen-wiseer-mcp
    ports:
      - "8765:8765"
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://localhost:8888/callback}
      - SPOTIFY_USER_ID=${SPOTIFY_USER_ID}
      - SPOTIFY_CACHE_PATH=/app/data/.spotify_cache
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8765
    volumes:
      - ../../data:/app/data
      - ../../.spotify_cache:/app/data/.spotify_cache
    networks:
      - listen-wiseer-network
    restart: unless-stopped

  # ── Chainlit app (chat UI + LangGraph agent) ─────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: infrastructure/containers/app/Dockerfile
    container_name: listen-wiseer-app
    ports:
      - "8501:8501"
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://localhost:8888/callback}
      - SPOTIFY_USER_ID=${SPOTIFY_USER_ID}
      - SPOTIFY_CACHE_PATH=/app/data/.spotify_cache
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - POSTGRES_URL=postgresql+psycopg://wiseer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/listen_wiseer
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_TRACING=${ENABLE_TRACING:-false}
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      - MCP_SERVER_HOST=mcp
      - MCP_SERVER_PORT=8765
      - LISTENING_HISTORY_PATH=/app/data/listening_history
      - TRACK_FEATURES_CACHE=/app/data/cache/track_features.parquet
      - GENRE_METADATA_CACHE=/app/data/cache/genre_metadata.parquet
      - SIMILARITY_METHOD=${SIMILARITY_METHOD:-hybrid}
      - AUDIO_FEATURE_WEIGHT=${AUDIO_FEATURE_WEIGHT:-0.6}
      - GENRE_WEIGHT=${GENRE_WEIGHT:-0.4}
      - MAX_AGENT_ITERATIONS=${MAX_AGENT_ITERATIONS:-10}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-60}
    volumes:
      - ../../data:/app/data
      - ../../infrastructure/db:/app/infrastructure/db
      - ../../models:/app/models
      - ../../logs:/app/logs
      - ../../.spotify_cache:/app/data/.spotify_cache
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      mcp:
        condition: service_started
    networks:
      - listen-wiseer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Optional: Jaeger tracing (--profile observability) ───────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: listen-wiseer-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    networks:
      - listen-wiseer-network
    profiles:
      - observability
